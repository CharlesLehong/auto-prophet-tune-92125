services:
  - type: web
    name: forecast-service
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: standard   # AutoGluon needs ~2GB RAM; do not use the free/starter tier
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
